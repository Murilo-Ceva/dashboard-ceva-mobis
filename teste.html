<!DOCTYPE html>
<html>
<head>
    <title>Teste Dashboard CEVA</title>
    <style>
        body { font-family: Arial; background: #1a1a2e; color: #fff; padding: 20px; }
        .card { background: #16213e; padding: 20px; margin: 10px 0; border-left: 4px solid #e62b2b; border-radius: 5px; }
        .ok { color: #22c55e; }
        .error { color: #e62b2b; }
        button { background: #e62b2b; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        button:hover { background: #c92424; }
        input { padding: 8px; width: 100%; max-width: 300px; margin-top: 10px; }
        textarea { width: 100%; height: 150px; background: #0f1525; color: #fff; border: 1px solid #e62b2b; padding: 10px; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🧪 Teste Dashboard CEVA</h1>
    
    <div class="card">
        <h2>1️⃣ Teste de Conexão</h2>
        <button onclick="testeConexao()">Testar Conexão ao Servidor</button>
        <p id="conexao"></p>
    </div>
    
    <div class="card">
        <h2>2️⃣ Listar Dados Carregados</h2>
        <button onclick="listarDados()">Listar Transportadoras</button>
        <textarea id="dados"></textarea>
    </div>
    
    <div class="card">
        <h2>3️⃣ Upload de CSV</h2>
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="uploadCSV()">Enviar CSV</button>
        <p id="resultado"></p>
    </div>

    <script>
        async function testeConexao() {
            const el = document.getElementById('conexao');
            el.innerHTML = '⏳ Testando...';
            try {
                const resp = await fetch('/api/tsp-data');
                if (resp.ok) {
                    const data = await resp.json();
                    el.innerHTML = `<span class="ok">✅ Servidor OK! ${data.length} transportadoras encontradas</span>`;
                    console.log(data);
                } else {
                    el.innerHTML = `<span class="error">❌ Erro: ${resp.status}</span>`;
                }
            } catch(e) {
                el.innerHTML = `<span class="error">❌ Erro: ${e.message}</span>`;
            }
        }
        
        async function listarDados() {
            const el = document.getElementById('dados');
            el.value = '⏳ Carregando...';
            try {
                const resp = await fetch('/api/tsp-data');
                const data = await resp.json();
                el.value = JSON.stringify(data, null, 2);
            } catch(e) {
                el.value = '❌ Erro: ' + e.message;
            }
        }
        
        async function uploadCSV() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) {
                alert('Selecione um arquivo CSV!');
                return;
            }
            
            const formData = new FormData();
            formData.append('file', file);
            
            const el = document.getElementById('resultado');
            el.innerHTML = '⏳ Enviando...';
            
            try {
                const resp = await fetch('/api/upload-csv', {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();
                
                if (data.success) {
                    el.innerHTML = `<span class="ok">✅ ${data.message}</span>`;
                } else {
                    el.innerHTML = `<span class="error">❌ ${data.error}</span>`;
                }
            } catch(e) {
                el.innerHTML = `<span class="error">❌ Erro: ${e.message}</span>`;
            }
        }
        
        // Testa automaticamente ao abrir
        setTimeout(testeConexao, 500);
    </script>
</body>
</html>
