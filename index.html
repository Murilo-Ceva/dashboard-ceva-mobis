function setOpts(id,vals,lab=x=>x){let el=$(id),cur=el.value,first=el.options[0].outerHTML;el.innerHTML=first+vals.map(v=>`<option value="${esc(v)}" ${String(v)===cur?'selected':''}>${esc(lab(v))}</option>`).join('');if(cur&&!vals.map(String).includes(String(cur)))el.value=''}function fillFilters(){let months=[...new Set(RAW.flatMap(r=>[r._mesVol,r._mesNF]).filter(Boolean))].sort((a,b)=>a-b);setOpts('fmes',months,mon);if(ACTIVE_MONTH)$('fmes').value=ACTIVE_MONTH;setOpts('freg',[...new Set(RAW.map(r=>r._reg).filter(Boolean))].sort());setOpts('ftsp',[...new Set(RAW.map(r=>r._tsp).filter(Boolean))].sort());setOpts('fuf',[...new Set(RAW.map(r=>r._uf).filter(Boolean))].sort());setOpts('fcid',[...new Set(RAW.map(r=>r._cid).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR')))}function pass(r,st){return !st||st==='np'&&r._np||st==='fp'&&r._fp||st==='pnp'&&r._pnp||st==='pfp'&&r._pfp||st==='fin'&&r._fin||st==='pend'&&r._pend}function applyFilters(reset=false){if(reset)DETAIL_PAGE=1;let f={m:$('fmes').value,reg:$('freg').value,tsp:$('ftsp').value,uf:$('fuf').value,cid:$('fcid').value,st:$('fst').value};ACTIVE_MONTH=f.m;BASE=RAW.filter(r=>(!f.reg||r._reg===f.reg)&&(!f.tsp||r._tsp===f.tsp)&&(!f.uf||r._uf===f.uf)&&(!f.cid||r._cid===f.cid)&&pass(r,f.st)&&(!SEARCH||[r._nf,r._dealer,r._dest,r._cid,r._uf,r._tsp,r.Status].join(' ').toLowerCase().includes(SEARCH)));DATA=BASE.filter(r=>(!f.m||r._mesVol==f.m||r._mesNF==f.m));fillFilters();render()}function clearFilters(){['fmes','freg','ftsp','fuf','fcid','fst'].forEach(id=>$(id).value='');$('search').value='';SEARCH='';ACTIVE_MONTH='';DETAIL_PAGE=1;applyFilters();toast('Filtros limpos')}

const VALUE_LABELS_PLUGIN={id:'valueLabels',afterDatasetsDraw(chart,args,opts){if(!opts||opts.display===false)return;let type=chart.config.type;if(type==='doughnut'||type==='pie')return;let {ctx,chartArea}=chart,small=chart.width<420;ctx.save();ctx.font=`800 ${small?8:9}px Inter,Arial`;ctx.textBaseline='middle';chart.data.datasets.forEach((ds,di)=>{let meta=chart.getDatasetMeta(di);if(meta.hidden||meta.type==='line'||ds.type==='line'||/meta/i.test(ds.label||''))return;(ds.data||[]).forEach((raw,i)=>{if(raw==null||!isFinite(raw)||Number(raw)===0)return;let el=meta.data[i];if(!el)return;let p=el.tooltipPosition(),fmtOpt=ds.valueFormat||opts.format||'auto',val=Number(raw);let txt=fmtOpt==='pct'?val.toFixed(1).replace('.',',')+'%':val.toLocaleString('pt-BR',{maximumFractionDigits:0});let horizontal=chart.options.indexAxis==='y';ctx.fillStyle=tc();ctx.strokeStyle=isDark()?'rgba(7,9,15,.78)':'rgba(255,255,255,.85)';ctx.lineWidth=3;if(horizontal){let x=p.x+7,y=p.y;ctx.textAlign='left';if(p.x>chartArea.right-44){x=p.x-7;ctx.textAlign='right';ctx.fillStyle='#fff'}ctx.strokeText(txt,x,y);ctx.fillText(txt,x,y)}else{ctx.textAlign='center';let y=Math.max(chartArea.top+9,p.y-9);ctx.strokeText(txt,p.x,y);ctx.fillText(txt,p.x,y)}})});ctx.restore()}};
function chart(id,cfg){const el=$(id);if(!el||!window.Chart||typeof el.getContext!=='function')return null;if(CHARTS[id]){try{CHARTS[id].destroy()}catch(e){}}const base={responsive:true,maintainAspectRatio:false,resizeDelay:80,layout:{padding:{top:8,right:10,left:2,bottom:2}},plugins:{legend:{display:true,position:'top',align:'start',labels:{color:mc(),font:{family:'Inter',size:8,weight:'800'},boxWidth:8,usePointStyle:true,padding:6}},tooltip:{backgroundColor:isDark()?'rgba(7,9,15,.96)':'rgba(255,255,255,.96)',titleColor:tc(),bodyColor:mc(),borderWidth:1,borderColor:isDark()?'#273050':'#dde3f0'}},scales:{x:{ticks:{color:mc(),font:{family:'Inter',size:10}},grid:{color:gc()}},y:{ticks:{color:mc(),font:{family:'Inter',size:10}},grid:{color:gc()}}}};cfg.options=merge(base,cfg.options||{});try{cfg.plugins=[VALUE_LABELS_PLUGIN].concat(cfg.plugins||[]);CHARTS[id]=new Chart(el.getContext('2d'),cfg);return CHARTS[id]}catch(e){console.warn('Chart',id,e);return null}}

function countColor(name,i){let n=String(name||'').toUpperCase();if(n==='NP')return'#2ecc71';if(n==='FP')return'#e63946';if(n==='PEND NP')return'#1d6be6';if(n==='PEND FP')return'#f4a620';return COLORS[i%COLORS.length]}function barHC(id,l,d,label='Quantidade'){const el=$(id);if(!el||!el.parentElement)return;const p=el.parentElement;if(CHARTS[id]){try{CHARTS[id].destroy()}catch(e){}delete CHARTS[id]}el.style.display='none';let wrap=p.querySelector('.hbar-wrap');if(!wrap){wrap=document.createElement('div');wrap.className='hbar-wrap';p.appendChild(wrap)}let max=Math.max(1,...d.map(x=>Number(x||0)));const rows=l.map((name,i)=>{const v=Number(d[i]||0),w=v/max*100,c=countColor(name,i);return `<div class="hbar-row" title="${esc(name)}: ${fmt(v)}"><div class="hbar-label">${esc(name)}</div><div class="hbar-track"><div class="hbar-fill" style="width:${Math.max(1,Math.min(100,w))}%;background:${c}cc"></div></div><div class="hbar-val">${fmt(v)}</div></div>`}).join('');wrap.innerHTML=`<div class="hbar-legend"><i></i>${label}</div>${rows}`}

function renderLeafletMap(d){let el=$('brmap');if(!el)return;el.innerHTML='<div class="map-title">🗺️ MAPA OTD POR ESTADO <b>'+(MAP==='vol'?'MOBIS VOLUME':'CEVA NF')+'</b></div><div class="map-tabs"><button class="'+(MAP==='nf'?'active':'')+'" onclick="setMap(\'nf\')">CEVA NF</button><button class="'+(MAP==='vol'?'active':'')+'" onclick="setMap(\'vol\')">Mobis Volume</button></div><div id="leaflet-br" class="leaflet-map"></div><div class="map-legend-real"><div class="ttl">OTD PERFORMANCE</div><span><i style="background:#00b050"></i>≥ 98%</span><span><i style="background:#27ae60"></i>95–97,9%</span><span><i style="background:#f5b642"></i>90–94,9%</span><span><i style="background:#f39c12"></i>88–89,9%</span><span><i style="background:#ef5b6a"></i>&lt; 88%</span><span><i style="background:#b7c0cc"></i>Sem dados</span></div>';if(!window.L){el.innerHTML='<div class="map-placeholder" style="display:flex!important;height:100%"><div><h3>Mapa Brasil</h3><p>Leaflet não carregou. Verifique conexão.</p></div></div>';return}let data={};d.forEach(x=>data[x.uf]=x);let ufName={Acre:'AC',Alagoas:'AL',Amazonas:'AM',Amapá:'AP',Amapa:'AP',Bahia:'BA',Ceará:'CE',Ceara:'CE','Distrito Federal':'DF','Espírito Santo':'ES','Espirito Santo':'ES',Goiás:'GO',Goias:'GO',Maranhão:'MA',Maranhao:'MA','Minas Gerais':'MG','Mato Grosso do Sul':'MS','Mato Grosso':'MT',Pará:'PA',Para:'PA',Paraíba:'PB',Paraiba:'PB',Pernambuco:'PE',Piauí:'PI',Piaui:'PI',Paraná:'PR',Parana:'PR','Rio de Janeiro':'RJ','Rio Grande do Norte':'RN',Rondônia:'RO',Rondonia:'RO',Roraima:'RR','Rio Grande do Sul':'RS','Santa Catarina':'SC',Sergipe:'SE','São Paulo':'SP','Sao Paulo':'SP',Tocantins:'TO'};let coords={AC:[-9.97,-67.81],AL:[-9.57,-36.55],AM:[-4.2,-63.2],AP:[1.4,-51.8],BA:[-12.6,-41.8],CE:[-5.2,-39.6],DF:[-15.8,-47.9],ES:[-19.6,-40.7],GO:[-16.1,-49.6],MA:[-5.1,-45.2],MG:[-18.5,-44.4],MS:[-20.7,-54.6],MT:[-13.1,-56.1],PA:[-4.5,-52.8],PB:[-7.1,-36.7],PE:[-8.4,-37.8],PI:[-7.7,-42.7],PR:[-24.7,-51.6],RJ:[-22.3,-42.7],RN:[-5.8,-36 (function(){

try{const originalDual=dual;dual=function(id,l,a,b,la,lb){

catch(e){}
